<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duelo do Conhecimento</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TELA INICIAL -->

<section id="telaInicio" class="tela">

  <div class="jogadores">

    <!-- JOGADOR 1 -->

    <div class="jogador">

      <h2>Jogador 1</h2>

      <input
      type="text"
      id="nome1"
      placeholder="Nome do jogador 1">

      <select id="turma1">
        <option>Selecione a turma</option>
      </select>

      <select id="personagem1">
        <option value="verbantis">Verbantis</option>
        <option value="globite">Globite</option>
        <option value="chemion">Chemion</option>
        <option value="calcubot">Calcubot</option>
      </select>

    </div>

    <!-- JOGADOR 2 -->

    <div class="jogador">

      <h2>Jogador 2</h2>

      <input
      type="text"
      id="nome2"
      placeholder="Nome do jogador 2">

      <select id="turma2">
        <option>Selecione a turma</option>
      </select>

      <select id="personagem2">
        <option value="verbantis">Verbantis</option>
        <option value="globite">Globite</option>
        <option value="chemion">Chemion</option>
        <option value="calcubot">Calcubot</option>
      </select>

    </div>

  </div>

  <!-- BOTÕES -->

  <div class="acoes">

    <button id="btnIniciar">
      ▶ INICIAR DUELO
    </button>

    <button id="btnRanking">
      🏆 RANKING
    </button>

  </div>

</section>

<!-- TELA DE BATALHA -->

<section id="telaBatalha" class="tela oculto">

<div class="arena">

  <!-- JOGADOR 1 -->

  <div class="lado">

    <div class="cardJogador">

      <h2 id="nomeJogador1">
        Jogador 1
      </h2>

      <div id="turmaJogador1">
        Turma
      </div>

      <div id="pontos1" class="pontos">
        🏆 0 pts
      </div>

      <div id="acertos1" class="acertos">
        ✅ 0 acertos
      </div>

      <div class="hpBox">
        <span>HP</span>
        <div class="hpBar">
          <div id="vida1" class="hpFill"></div>
        </div>
      </div>

    </div>

    <div id="pokemon1" class="personagem"></div>

  </div>

  <!-- VS -->

  <!-- JOGADOR 2 -->

  <div class="lado">

    <div class="cardJogador">

      <h2 id="nomeJogador2">
        Jogador 2
      </h2>

      <div id="turmaJogador2">
        Turma
      </div>

      <div id="pontos2" class="pontos">
        🏆 0 pts
      </div>

      <div id="acertos2" class="acertos">
        ✅ 0 acertos
      </div>

      <div class="hpBox">
        <span>HP</span>
        <div class="hpBar">
          <div id="vida2" class="hpFill"></div>
        </div>
      </div>

    </div>

    <div id="pokemon2" class="personagem"></div>

  </div>

</div>

<!-- DANO DA RODADA -->

<div id="danoRodada">

⚔️ DANO DA RODADA

❤️❤️

</div>

<!-- BARRA DE TEMPO -->
  
  <div id="barraTempo">

  <div id="tempoRestante"></div>

</div>

<!-- DISCIPLINA -->

<div id="disciplina">

QUÍMICA

</div>

<!-- PERGUNTA -->

<div id="pergunta">

Pergunta aparecerá aqui

</div>

<!-- RESPOSTAS -->

<div class="respostas">

<!-- JOGADOR 1 -->

<div class="controle">

<h3>Jogador 1</h3>

<button>A</button>
<button>B</button>
<button>C</button>
<button>D</button>

</div>

<!-- JOGADOR 2 -->

<div class="controle">

<h3>Jogador 2</h3>

<button>A</button>
<button>B</button>
<button>C</button>
<button>D</button>

</div>

</div>

<!-- LOG DE BATALHA -->

<div id="mensagemBatalha">

A batalha vai começar!

</div>

</section>

<script src="questoes.js"></script>
<script src="personagens.js"></script>
<script src="script.js"></script>

</body>
</html>
